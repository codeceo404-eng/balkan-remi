<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Remi 51</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════ -->
<!--  LOBBY EKRAN                                              -->
<!-- ══════════════════════════════════════════════════════════ -->
<!-- ══════════════════════════════════════════════════════════ -->
<!--  LOADING SCREEN                                            -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="screen-loading">
  <div class="loading-suits">
    <span class="ls ls-1">♠</span>
    <span class="ls ls-2">♥</span>
    <span class="ls ls-3">♣</span>
    <span class="ls ls-4">♦</span>
  </div>
  <div class="loading-title">Remi 51</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!--  LOBBY EKRAN                                              -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="screen-lobby" style="display:none">
  <!-- Plutajuće karte u pozadini -->
  <div class="lobby-bg-cards" aria-hidden="true">
    <span class="bg-card bc-1">♠</span>
    <span class="bg-card bc-2">♥</span>
    <span class="bg-card bc-3">♣</span>
    <span class="bg-card bc-4">♦</span>
    <span class="bg-card bc-5">♠</span>
    <span class="bg-card bc-6">♥</span>
  </div>

  <div class="lobby-card">
    <div class="lobby-logo">
      <span class="logo-suit red anim-spin-in">♥</span>
      <span class="logo-title anim-fade-up">Remi 51</span>
      <span class="logo-suit black anim-spin-in" style="animation-delay:.1s">♠</span>
    </div>
    <p class="lobby-subtitle anim-fade-up" style="animation-delay:.15s">Balkanski remi za 2–4 igrača</p>

    <div class="lobby-fields anim-fade-up" style="animation-delay:.25s">
      <input id="input-name" type="text" placeholder="Vaše ime" maxlength="20" autocomplete="off">

      <button id="btn-create" class="btn-gold">✦ Kreiraj novu sobu</button>

      <div class="lobby-divider"><span>ili se pridruži</span></div>

      <div class="join-row">
        <input id="input-room" type="text" placeholder="KOD SOBE" maxlength="5" autocomplete="off">
        <button id="btn-join" class="btn-outline">Pridruži se</button>
      </div>

      <button id="btn-reconnect" class="btn-ghost" style="display:none">
        ↩ Vrati se u zadnju sobu
      </button>
    </div>

    <div id="lobby-error" class="lobby-error" style="display:none"></div>

    <!-- TikTok link -->
    <a href="" target="_blank" rel="noopener" class="tiktok-link" title="Prati nas na TikToku">
      <svg class="tiktok-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.17 8.17 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
      </svg>
    </a>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!--  GAME EKRAN                                               -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="screen-game" style="display:none">

  <!-- TOPBAR -->
  <header id="topbar">
    <div class="topbar-left">
      <span id="lbl-room" class="room-badge">🃏 SOBA: ---</span>
      <span id="lbl-turn" class="turn-label">Čeka početak...</span>
    </div>
    <div class="topbar-right">
      <button id="btn-start"     class="btn-gold btn-sm">▶ Start</button>
      <button id="btn-new-round" class="btn-gold btn-sm" style="display:none">↺ Nova runda</button>
      <button id="btn-leave"     class="btn-leave btn-sm" title="Napusti sobu">✕ Izlaz</button>
    </div>
  </header>

  <!-- STOLNI RASPORED -->
  <div id="game-board">

    <!-- Protivnik gore (2 ili 4 igrača) -->
    <div id="opp-top" class="opp-panel opp-h" style="display:none"></div>

    <!-- Srednji red: lijevo / stol / desno -->
    <div id="middle-row">
      <div id="opp-left"  class="opp-panel opp-v" style="display:none"></div>

      <!-- STOL -->
      <main id="game-main">
        <div id="table-piles">
          <div class="pile-wrap">
            <div id="deck-pile" class="pile deck-back" title="Klikni za vučenje s kupa">
              <div class="deck-pattern"></div>
            </div>
            <div class="pile-label">Kup (<span id="deck-count">0</span>)</div>
          </div>
          <div class="pile-wrap">
            <div id="discard-pile" class="pile" title="Klikni za uzimanje s otpada">
              <span class="pile-empty-label">Otpad</span>
            </div>
            <div class="pile-label">Otpad</div>
          </div>
        </div>
        <div id="melds-area">
          <div class="melds-empty">Stol je prazan — budi prvi koji položi kombinaciju!</div>
        </div>
      </main>

      <div id="opp-right" class="opp-panel opp-v" style="display:none"></div>
    </div>

    <!-- RUKA + KONTROLE -->
    <footer id="hand-footer">
      <div id="my-info-bar"></div>
      <div id="action-bar">
        <div class="action-left">
          <button id="btn-meld"           class="btn-action btn-green"  disabled>🃏 Dodaj meld</button>
          <button id="btn-discard"        class="btn-action btn-red"    disabled>↩ Baci</button>
          <button id="btn-open-game"      class="btn-action btn-green"  style="display:none">✅ Otvori igru!</button>
          <button id="btn-cancel-opening" class="btn-action btn-gray"   style="display:none">↩ Poništi</button>
        </div>
        <div id="sel-info" class="sel-info"></div>
      </div>
      <div id="opening-stage" style="display:none"></div>
      <div id="hand-area"></div>
    </footer>

  </div><!-- /game-board -->

  <!-- CHAT (sklopivi) -->
  <div id="chat-panel">
    <div id="chat-toggle" onclick="openChat()">
      💬 Chat<span id="chat-badge" class="chat-badge" style="display:none"></span>
    </div>
    <div id="chat-body">
      <div id="chat-log"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Poruka..." maxlength="200" autocomplete="off">
        <button id="btn-chat" class="btn-gold btn-sm">↵</button>
      </div>
    </div>
  </div>

</div><!-- /screen-game -->

<!-- ══════════════════════════════════════════════════════════ -->
<!--  ROUND OVER OVERLAY                                        -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="overlay" style="display:none">
  <div id="overlay-card">
    <h2 id="overlay-title"></h2>
    <div id="overlay-body"></div>
    <button id="overlay-btn" class="btn-gold">▶ Nova runda</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
